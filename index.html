<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sakshi ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
    overflow: hidden;
}

.container {
    margin-top: 100px;
}

.box {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 20px;
    display: inline-block;
    backdrop-filter: blur(10px);
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4d6d;
    margin: 10px;
    cursor: pointer;
    font-weight: bold;
}

input {
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.heart {
    position: absolute;
    color: red;
    animation: float 5s linear infinite;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}
</style>

</head>
<body>

<div class="container">
    <div class="box">
        <h2 id="text">Hey Sakshi 😊 Ready?</h2>
        <div id="inputBox"></div>
        <div id="buttons">
            <button onclick="nextStep()">Next ❤️</button>
        </div>
    </div>
</div>

<script>

let step = 0;

const messages = [
"Step 1: Pehle apna naam likho 😊",
"Step 2: Waise mujhe already pata hai... par phir bhi 😏",
"Step 3: Tumhari smile ka koi jawab nahi ❤️",
"Step 4: Tum thodi si alag ho... aur wahi best hai 💫",
"Step 5: Ek sawal hai tumse...",
"Step 6: Kya tum mujhe miss karti ho? 😏",
"Step 7: Sach sach batana 😌",
"Step 8: Kyunki main toh karta hoon...",
"Step 9: Aur shayad thoda zyada hi ❤️",
"Step 10: I really like you Sakshi 💖"
];

function nextStep() {

    if(step === 0){
        document.getElementById("inputBox").innerHTML = 
        '<input id="nameInput" placeholder="Type your name ❤️">';
    }

    if(step === 5){
        document.getElementById("buttons").innerHTML = `
            <button onclick="answer('Yes')">Yes 😍</button>
            <button onclick="answer('No')">No 😒</button>
        `;
        document.getElementById("text").innerHTML = messages[step];
        step++;
        return;
    }

    if(step < messages.length){
        document.getElementById("text").innerHTML = messages[step];
        step++;
    }
}

function answer(ans){
    document.getElementById("text").innerHTML = 
    "Hmm... tumne '" + ans + "' choose kiya 😏❤️";
    document.getElementById("buttons").innerHTML = 
    '<button onclick="nextStep()">Continue 💖</button>';
}

// Floating hearts
setInterval(() => {
    let heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);

}, 500);

</script>

</body>
</html>
