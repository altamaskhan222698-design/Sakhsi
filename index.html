<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Sakshi ❤️</title>

<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(to bottom, #000000, #1a001a);
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 40%;
  font-size: 28px;
}

#text {
  font-size: 18px;
  padding: 10px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  border: none;
  background: #ff4d88;
  color: white;
  border-radius: 25px;
  margin-top: 20px;
  cursor: pointer;
}

.heart {
  position: fixed;
  color: red;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(100vh);}
  100% {transform: translateY(-10vh);}
}

#final {
  display: none;
  font-size: 24px;
  margin-top: 40%;
  padding: 10px;
}
</style>

</head>

<body>

<h1>Hey Sakshi ❤️</h1>
<div id="text"></div>

<button onclick="startLove()">Tap Here 💖</button>

<div id="final">You Made My Life Beautiful 💫❤️<br>Thank You For Everything 🥺</div>

<!-- Romantic Music -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=romantic-ambient-110397.mp3">
</audio>

<script>
let msg = "I may not be perfect, but when I see you... everything feels perfect ❤️";
let i = 0;

function typeWriter() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typeWriter, 40);
  }
}

function createHeart() {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 400);

function startLove() {
  document.getElementById("bgMusic").play();
  typeWriter();

  setTimeout(() => {
    document.getElementById("final").style.display = "block";
  }, 7000);
}
</script>

</body>
      </html>
